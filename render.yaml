services:
  - type: web
    name: engramic-app
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ENGRAMIC_SESSION_SECRET
        generateValue: true
      - key: ENGRAMIC_SECURE_COOKIES
        value: "true"
      - key: ENGRAMIC_FORCE_CACHE
        value: "true"
      - key: ENGRAMIC_SEED_DEMO_ACCOUNTS
        value: "true"
      - key: ENGRAMIC_USERS_DB
        value: /var/data/users.db
      - key: ENGRAMIC_CLINICAL_DB
        value: /var/data/clinical.db
      - key: ENGRAMIC_GRAPH_FILE
        value: /var/data/graph_data.json
      - key: ENGRAMIC_DOCUMENT_DIR
        value: /var/data/clinical_documents
      - key: ENGRAMIC_MAX_UPLOAD_MB
        value: "10"
      - key: ENGRAMIC_MAX_PDF_PAGES
        value: "20"
    disk:
      name: engramic-data
      mountPath: /var/data
      sizeGB: 1
